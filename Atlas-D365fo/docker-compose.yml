# Local full-stack run: backend + frontend. `docker compose up`.
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Optional upgrades — leave unset for offline fallbacks.
      # D365_BASE_URL: https://yourenv.axcloud.dynamics.com
      # D365_TENANT_ID / D365_CLIENT_ID / D365_CLIENT_SECRET
      # JINA_API_KEY / GROQ_API_KEY / DATABASE_URL
      FASTMCP_LOG_LEVEL: "INFO"

  frontend:
    image: node:22-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run build && npm start"
    ports:
      - "3000:3000"
    environment:
      ATLAS_API_URL: "http://backend:8000"
    depends_on:
      - backend
